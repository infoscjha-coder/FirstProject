<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Room Calculator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { margin-top: 0; color: var(--primary); text-align: center; }
        p { font-size: 0.9rem; color: #64748b; text-align: center; }

        .input-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #1d4ed8; }

        #resultSection {
            margin-top: 2rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 8px;
            display: none; /* Hidden until n8n responds */
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
            font-style: italic;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Room Estimator</h2>
    <p>Enter dimensions to calculate Area & Volume via n8n.</p>

    <div class="input-group">
        <label>Length (ft/m)</label>
        <input type="number" id="length" placeholder="Enter length..." required>
    </div>

    <div class="input-group">
        <label>Width (ft/m)</label>
        <input type="number" id="width" placeholder="Enter width..." required>
    </div>

    <div class="input-group">
        <label>Height (ft/m)</label>
        <input type="number" id="height" placeholder="Enter height..." required>
    </div>

    <button onclick="sendToN8N()">Calculate with n8n</button>

    <div id="loader" class="loading">Talking to n8n...</div>

    <div id="resultSection">
        <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 5px;">RESULTS:</div>
        <div id="output" style="white-space: pre-wrap; line-height: 1.6;"></div>
    </div>
</div>

<script>
    async function sendToN8N() {
        const length = document.getElementById('length').value;
        const width = document.getElementById('width').value;
        const height = document.getElementById('height').value;

        // Basic validation
        if (!length || !width || !height) {
            alert("Please fill all fields");
            return;
        }

        // Show loading, hide previous results
        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultSection').style.display = 'none';

        const payload = {
            length: parseFloat(length),
            width: parseFloat(width),
            height: parseFloat(height)
        };

        try {
            // NOTE: Replace 'YOUR_WEBHOOK_URL' with your actual n8n Webhook URL later
            const response = await fetch('YOUR_WEBHOOK_URL', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error('Network response was not ok');

            const data = await response.text(); 
            
            // Show the result
            document.getElementById('loader').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('output').innerText = data;

        } catch (error) {
            document.getElementById('loader').style.display = 'none';
            alert("Error connecting to n8n. Make sure your workflow is active!");
            console.error(error);
        }
    }
</script>

</body>
</html>
