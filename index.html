<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Room Estimator</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
       
        /* Main Card */
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { margin-top: 0; color: var(--primary); text-align: center; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.8rem; }
        input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* The Modal (Background) */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        /* Modal Box */
        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 25px;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 30px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-btn { background: #64748b; margin-top: 20px; }
        #output { white-space: pre-wrap; text-align: left; background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>Room Estimator</h2>
    <div class="input-group">
        <label>Length</label>
        <input type="number" id="length" placeholder="0">
    </div>
    <div class="input-group">
        <label>Width</label>
        <input type="number" id="width" placeholder="0">
    </div>
    <div class="input-group">
        <label>Height</label>
        <input type="number" id="height" placeholder="0">
    </div>
    <button onclick="sendToN8N()" id="calcBtn">Calculate Now</button>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color: #16a34a;">Calculation Results</h3>
        <div id="output">Calculating...</div>
        <button class="close-btn" onclick="closeModal()">Close Window</button>
    </div>
</div>

<script>
    const modal = document.getElementById("resultModal");

    async function sendToN8N() {
        const length = document.getElementById('length').value;
        const width = document.getElementById('width').value;
        const height = document.getElementById('height').value;

        if (!length || !width || !height) return alert("Fill all fields!");

        // Update button text and disable
        const btn = document.getElementById('calcBtn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const payload = { length, width, height };

        try {
            // Replace with your n8n Production URL
            const response = await fetch('https://subhash77.app.n8n.cloud/webhook/room-calculator', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.text();
           
            // Show modal and inject result
            document.getElementById('output').innerText = data;
            modal.style.display = "block";

        } catch (error) {
            alert("Error connecting to n8n!");
        } finally {
            btn.innerText = "Calculate Now";
            btn.disabled = false;
        }
    }

    function closeModal() {
        modal.style.display = "none";
    }

    // Close modal if user clicks outside the box
    window.onclick = function(event) {
        if (event.target == modal) closeModal();
    }
</script>

</body>
</html>
